<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="index.css">
    <title>Portfolio Web</title>
</head>
<body>

    <!-- Botón hamburguesa -->
    <button id="menuBtn" aria-label="Abrir menú">
      <span></span><span></span><span></span>

    <!-- Menú lateral -->
    <nav id="sideMenu">
      <ul>

        <li><a href="#sobreMi" class="nav-link" data-idioma="nav_sobreMi"></a></li>

        <li><a href="#lenguajes" class="nav-link" data-idioma="nav_lenguajes"></a></li>

      <select id="idiomaSelect">

        <option value="en">English</option>
        <option value="ca">Català</option>

    <div id="overlay"></div>

        <section id="sobreMi" class="seccion">
            <h2 data-idioma="sobreMi_titulo"></h2>
            <p data-idioma="sobreMi_texto"></p>
        </section>

        <section id="sobrePro" class="seccion">
            <h2 data-idioma="sobrePro_titulo"></h2>
            <p data-idioma="sobrePro_texto"></p>

        <section id="lenguajes" class="seccion">

            <div class="skills-grid">

                <div class="proyecto">
                    <h3>EA FC 26 Player Search</h3>
                    <p data-idioma="proyecto1_texto"></p>

                    <p data-idioma="proyecto2_texto"></p>
                </div>
            </div>

        <section id="contacto" class="seccion">
            <h2 data-idioma="contacto_titulo"></h2>
            <ul class="contacto-list">
                <li><a href="mailto:tuemail@email.com" data-idioma="contacto_email"></a></li>
                <li><a href="#" target="_blank" data-idioma="contacto_linkedin"></a></li>
                <li><a href="#" target="_blank" data-idioma="contacto_github"></a></li>

    <footer id="footer">
        <p data-idioma="footer_texto"></p>
